<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Uploads | NoteVerse</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-flex">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M6.5 2H20V22H6.5A2.5 2.5 0 0 1 4 19.5V4.5A2.5 2.5 0 0 1 6.5 2Z" stroke="#f5a623" stroke-width="2.5" stroke-linejoin="round"/>
                </svg>
                NoteVerse
            </div>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
        </div>

        <ul class="sidebar-menu">
            <li><a href="/views/student_dashboard.html"><i class="fas fa-home" style="width:16px"></i> Home</a></li>
            <li><a href="/views/my_library.html"><i class="fas fa-book" style="width:16px"></i> My Library</a></li>
            <li><a href="/views/download.html"><i class="fas fa-download" style="width:16px"></i> Downloads</a></li>
            <li class="active"><a href="#"><i class="fas fa-upload" style="width:16px"></i> My Uploads</a></li>
            <li><a href="#"><i class="fas fa-heart" style="width:16px"></i> Favorites</a></li>
            <li><a href="/views/faculty_profile.html"><i class="fas fa-cog" style="width:16px"></i> Profile</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="/views/login.html" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </aside>

    <main class="main-content">

        <header class="top-header animate-fade-down">
            <div class="header-left">
                <button class="hamburger-btn" onclick="toggleSidebar()">
                    <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="welcome-text">
                    <h1>My Uploads 📤</h1>
                    <p class="hide-on-mobile">Notes jo tumne share kiye hain</p>
                </div>
            </div>
            <div class="profile-section">
                <div class="profile-pic" id="userAvatar">MK</div>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar animate-fade-up">
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(245,166,35,0.1);color:#f5a623">
                    <i class="fas fa-file-pdf"></i>
                </div>
                <div>
                    <div class="stat-number" id="totalUploads">0</div>
                    <div class="stat-label">Total Uploads</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(78,205,196,0.1);color:#4ecdc4">
                    <i class="fas fa-eye"></i>
                </div>
                <div>
                    <div class="stat-number" id="totalCourses">0</div>
                    <div class="stat-label">Courses Covered</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(167,139,250,0.1);color:#a78bfa">
                    <i class="fas fa-calendar"></i>
                </div>
                <div>
                    <div class="stat-number" id="latestUpload">—</div>
                    <div class="stat-label">Latest Upload</div>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-section animate-fade-up" style="padding-top:0">
            <div class="search-bar-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchUploads" placeholder="Search your uploads...">
            </div>
        </div>

        <!-- Uploads Grid -->
        <div class="notes-grid-section animate-fade-up delay-1">
            <div id="uploadsContainer" class="notes-grid">
                <!-- Skeleton -->
                <div class="note-card" style="gap:12px">
                    <div class="skeleton" style="height:20px;width:60px;border-radius:50px"></div>
                    <div class="skeleton" style="height:48px;width:48px;border-radius:12px"></div>
                    <div class="skeleton" style="height:18px;width:80%"></div>
                    <div class="skeleton" style="height:14px;width:50%"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <div class="skeleton" style="height:38px;border-radius:10px"></div>
                        <div class="skeleton" style="height:38px;border-radius:10px"></div>
                    </div>
                </div>
                <div class="note-card" style="gap:12px">
                    <div class="skeleton" style="height:20px;width:60px;border-radius:50px"></div>
                    <div class="skeleton" style="height:48px;width:48px;border-radius:12px"></div>
                    <div class="skeleton" style="height:18px;width:80%"></div>
                    <div class="skeleton" style="height:14px;width:50%"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <div class="skeleton" style="height:38px;border-radius:10px"></div>
                        <div class="skeleton" style="height:38px;border-radius:10px"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;">
    <div style="background:#1a1d27;border:1px solid #2d3147;border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center;">
        <div style="font-size:48px;margin-bottom:16px">🗑️</div>
        <h3 style="font-family:'Syne',sans-serif;font-size:20px;color:#f0f2f8;margin-bottom:8px">Note Delete Karo?</h3>
        <p style="color:#8b91a7;font-size:14px;margin-bottom:24px">Yeh action undo nahi ho sakta!</p>
        <div style="display:flex;gap:12px;justify-content:center">
            <button onclick="closeDeleteModal()" style="padding:10px 24px;border-radius:10px;background:#13161e;border:1px solid #2d3147;color:#8b91a7;font-weight:600;cursor:pointer;">Cancel</button>
            <button onclick="confirmDelete()" style="padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#e05555);border:none;color:white;font-weight:700;cursor:pointer;">Delete</button>
        </div>
    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}

let deleteNoteId = null;

function openDeleteModal(noteId) {
    deleteNoteId = noteId;
    const modal = document.getElementById('deleteModal');
    modal.style.display = 'flex';
}

function closeDeleteModal() {
    document.getElementById('deleteModal').style.display = 'none';
    deleteNoteId = null;
}

async function confirmDelete() {
    if (!deleteNoteId) return;
    try {
        await window.deleteNote(deleteNoteId);
        closeDeleteModal();
    } catch(e) {
        alert('Delete fail hua!');
    }
}

document.getElementById('searchUploads').addEventListener('input', function() {
    const search = this.value.toLowerCase();
    const filtered = (window.myUploads || []).filter(note =>
        (note.title || '').toLowerCase().includes(search) ||
        (note.course || '').toLowerCase().includes(search)
    );
    renderUploads(filtered);
});
</script>

<script type="module" src="uploads.js"></script>
<script type="module" src="/dashboard-logic.js"></script>
<script type="module">
    import { setupLogout } from "/auth-guard.js";
    setupLogout();
</script>

</body>
</html>
