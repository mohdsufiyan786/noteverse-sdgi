<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Uploads | NoteVerse</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="stylesheet" href="my-uploads.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-flex">
                <!-- COPY FROM student_dashboard.html -->
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M6.5 2H20V22H6.5A2.5 2.5 0 0 1 4 19.5V4.5A2.5 2.5 0 0 1 6.5 2Z" stroke="#FFCC00" stroke-width="2.5" stroke-linejoin="round"/>
                </svg>
                NoteVerse
            </div> 
            <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/views/student_dashboard.html"><i class="fas fa-home" style="width:16px"></i> Home</a></li>
            <li><a href="/views/my_library.html"><i class="fas fa-book" style="width:16px"></i> My Library</a></li>
            <li><a href="/views/saved_notes/saved-notes.html"><i class="fas fa-heart" style="width:16px"></i> Saved Notes</a></li>
            <li class="active"><a href="#"><i class="fas fa-upload" style="width:16px"></i> My Uploads</a></li>
            <li><a href="/views/leaderboard/index.html"><i class="fas fa-trophy" style="width:16px"></i> Leaderboard</a></li>
            <li><a href="/views/profile/index.html"><i class="fas fa-cog" style="width:16px"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/views/login.html" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </aside>

    <main class="main-content">

        <!-- HEADER -->
        <div class="top-header animate-fade-down">
            <div class="header-left">
                <button class="hamburger-btn" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0A1931" stroke-width="2.5">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="welcome-text">
                    <h1>My Uploads 📤</h1>
                    <p class="hide-on-mobile">Notes shared By you</p>
                </div>
            </div>
            <div class="profile-section">
                <div class="profile-pic" id="headerAvatar">MK</div>
            </div>
        </div>

        <!-- STATS BAR -->
        <div class="mu-stats-bar animate-fade-up">
            <div class="mu-stat-card">
                <div class="mu-stat-icon" style="background:#FFF7ED;color:#F97316">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div>
                    <div class="mu-stat-num" id="totalUploads">0</div>
                    <div class="mu-stat-label">Total Uploads</div>
                </div>
            </div>
            <div class="mu-stat-card">
                <div class="mu-stat-icon" style="background:#EFF6FF;color:#3B82F6">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <div class="mu-stat-num" id="totalCourses">0</div>
                    <div class="mu-stat-label">Courses</div>
                </div>
            </div>
            <div class="mu-stat-card">
                <div class="mu-stat-icon" style="background:#F0FDF4;color:#16A34A">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div>
                    <div class="mu-stat-num" id="latestUpload">—</div>
                    <div class="mu-stat-label">Latest Upload</div>
                </div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-section animate-fade-up">
            <div class="search-bar-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchUploads" placeholder="Search your uploads...">
            </div>
        </div>

        <!-- NOTES GRID -->
        <div class="animate-fade-up delay-1">
            <div id="uploadsContainer" class="notes-grid">
                <!-- Skeletons -->
                <div class="note-card"><div class="mu-skeleton" style="height:200px;border-radius:12px"></div></div>
                <div class="note-card"><div class="mu-skeleton" style="height:200px;border-radius:12px"></div></div>
                <div class="note-card"><div class="mu-skeleton" style="height:200px;border-radius:12px"></div></div>
            </div>
        </div>

    </main>
</div>

<!-- EDIT MODAL -->
<div class="mu-modal-overlay" id="editModal">
    <div class="mu-modal-card">
        <div class="mu-modal-header">
            <h3>✏️ Edit Note</h3>
            <button class="mu-modal-close" onclick="closeEditModal()">✕</button>
        </div>
        <div class="mu-modal-body">
            <div class="p-input-group" style="margin-bottom:16px">
                <label>Title</label>
                <input type="text" id="edit-title" placeholder="Note title">
            </div>
            <div class="mu-edit-grid">
                <div class="p-input-group">
                    <label>Course</label>
                    <select id="edit-course">
                        <option value="">Select Course</option>
                        <option value="BCA">BCA</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="MBA">MBA</option>
                        <option value="MCA">MCA</option>
                        <option value="B.Com">B.Com</option>
                    </select>
                </div>
                <div class="p-input-group">
                    <label>Semester</label>
                    <select id="edit-semester">
                        <option value="">Select Semester</option>
                        <option value="1st">1st Sem</option>
                        <option value="2nd">2nd Sem</option>
                        <option value="3rd">3rd Sem</option>
                        <option value="4th">4th Sem</option>
                        <option value="5th">5th Sem</option>
                        <option value="6th">6th Sem</option>
                    </select>
                </div>
            </div>
            <div class="p-input-group" style="margin-top:16px">
                <label>Type</label>
                <select id="edit-type">
                    <option value="Notes">Notes</option>
                    <option value="PYQ Papers">PYQ Papers</option>
                    <option value="Assignment">Assignment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div class="mu-modal-footer">
            <button class="mu-btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="mu-btn-save" id="editSaveBtn" onclick="saveEdit()">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="mu-modal-overlay" id="deleteModal">
    <div class="mu-modal-card" style="max-width:380px;text-align:center">
        <div style="font-size:52px;margin-bottom:12px">🗑️</div>
        <h3 style="font-family:'Outfit',sans-serif;font-size:20px;color:#0A1931;margin-bottom:8px">Delete Notes?</h3>
        <p style="color:#64748B;font-size:14px;margin-bottom:24px">This action can't be undo!</p>
        <div class="mu-modal-footer" style="justify-content:center">
            <button class="mu-btn-cancel" onclick="closeDeleteModal()">Cancel</button>
            <button class="mu-btn-delete" onclick="confirmDelete()">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebarOverlay').classList.toggle('active');
}

let deleteNoteId = null;
let editNoteId = null;

function openDeleteModal(id) {
    deleteNoteId = id;
    document.getElementById('deleteModal').classList.add('active');
}
function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('active');
    deleteNoteId = null;
}
async function confirmDelete() {
    if (!deleteNoteId) return;
    try {
        await window.deleteNote(deleteNoteId);
        closeDeleteModal();
    } catch(e) { alert('Delete fail hua!'); }
}

function openEditModal(id) {
    editNoteId = id;
    const note = (window.myUploads || []).find(n => n.id === id);
    if (!note) return;
    document.getElementById('edit-title').value = note.title || '';
    setSelect('edit-course', note.course || '');
    setSelect('edit-semester', note.semester || '');
    setSelect('edit-type', note.type || 'Notes');
    document.getElementById('editModal').classList.add('active');
}
function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editNoteId = null;
}
async function saveEdit() {
    if (!editNoteId) return;
    const btn = document.getElementById('editSaveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    try {
        await window.updateNote(editNoteId, {
            title: document.getElementById('edit-title').value.trim(),
            course: document.getElementById('edit-course').value,
            semester: document.getElementById('edit-semester').value,
            type: document.getElementById('edit-type').value,
        });
        closeEditModal();
    } catch(e) { alert('Update fail hua!'); }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
}

function setSelect(id, val) {
    const el = document.getElementById(id);
    if (!el) return;
    for (let opt of el.options) { if (opt.value === val) { opt.selected = true; break; } }
}

document.getElementById('searchUploads').addEventListener('input', function() {
    const s = this.value.toLowerCase();
    const filtered = (window.myUploads || []).filter(n =>
        (n.title||'').toLowerCase().includes(s) ||
        (n.course||'').toLowerCase().includes(s)
    );
    window.renderUploads(filtered);
});
</script>

<script type="module" src="my-uploads.js"></script>
<script type="module" src="/dashboard-logic.js"></script>
<script type="module">
    import { setupLogout } from "/auth-guard.js";
    setupLogout();
</script>
</body>
</html>
