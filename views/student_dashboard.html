<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebarOverlay').classList.toggle('active');
}

let currentCategory = 'all';
window.allNotes = [];

document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', () => {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentCategory = pill.dataset.cat;
        filterAndRender();
    });
});

document.getElementById('searchNotes').addEventListener('input', filterAndRender);

document.getElementById('filterToggle').addEventListener('click', () => {
    const panel = document.getElementById('filterPanel');
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
});

function applyFilters() { filterAndRender(); }

function clearFilters() {
    document.getElementById('filterCourse').value = '';
    document.getElementById('filterSem').value = '';
    filterAndRender();
}

function filterAndRender() {
    const search = document.getElementById('searchNotes').value.toLowerCase();
    const filterCourse = document.getElementById('filterCourse').value;
    const filterSem = document.getElementById('filterSem').value;
    let filtered = (window.allNotes || []).filter(note => {
        const matchSearch = !search ||
            (note.title||'').toLowerCase().includes(search) ||
            (note.course||'').toLowerCase().includes(search) ||
            (note.uploadedBy||'').toLowerCase().includes(search);
        const matchCat = currentCategory === 'all' ||
            (note.course||'').includes(currentCategory) ||
            (note.semester||'').includes(currentCategory);
        const matchCourse = !filterCourse || note.course === filterCourse;
        const matchSem = !filterSem || (note.semester||'').includes(filterSem);
        return matchSearch && matchCat && matchCourse && matchSem;
    });
    renderNotes(filtered);
}

window.renderNotes = function(notes) {
    const container = document.getElementById('notesContainer');
    colorIdx = 0;
    if (notes.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <h3>No notes found</h3>
                <p>Try different filters or be the first to upload!</p>
            </div>`;
        return;
    }
    container.innerHTML = notes.map(note => createCard(note)).join('');
}

const CARD_COLORS = [
    { bg: '#FFF7ED', color: '#F97316', border: '#FED7AA' },
    { bg: '#EFF6FF', color: '#3B82F6', border: '#BFDBFE' },
    { bg: '#F0FDF4', color: '#16A34A', border: '#BBF7D0' },
    { bg: '#FAF5FF', color: '#A855F7', border: '#E9D5FF' },
    { bg: '#FDF2F8', color: '#EC4899', border: '#FBCFE8' },
];
let colorIdx = 0;

function createCard(note) {
    const c = CARD_COLORS[colorIdx % CARD_COLORS.length];
    colorIdx++;
    const isSaved = window.savedNoteIds?.has(note.id);
    return `
        <div class="note-card animate-fade-up" style="display:flex;flex-direction:column;position:relative;">
            <button class="sn-heart-btn-dash ${isSaved ? 'saved' : ''}"
                id="heart-${note.id}"
                onclick="toggleSaveNote('${note.id}', this)"
                title="${isSaved ? 'Remove from saved' : 'Save note'}">
                <i class="fa${isSaved ? 's' : 'r'} fa-heart"></i>
            </button>
            <div style="background:${c.bg};color:${c.color};border:1px solid ${c.border};display:inline-block;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;width:fit-content;">
                ${note.course || 'General'}
            </div>
            <div style="background:${c.bg};color:${c.color};width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;">
                <i class="fas fa-file-pdf"></i>
            </div>
            <h3 class="note-title" style="padding-right:42px;">${note.title || 'Untitled Note'}</h3>
            <p class="note-meta">
                By ${note.uploadedBy || 'Anonymous'} •
                <span>${note.semester || ''}</span>
            </p>
            <div class="card-filename">
                <i class="fas fa-paperclip"></i>
                ${note.fileName || (note.title || 'Note') + '.pdf'}
            </div>
            <div style="display:flex;gap:10px;margin-top:auto;padding-top:12px;">
                <a href="${note.fileUrl}" target="_blank" style="flex:1;text-decoration:none;">
                    <button style="width:100%;padding:10px;border-radius:10px;background:#EFF6FF;border:1px solid #BFDBFE;color:#3B82F6;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;"
                        onmouseover="this.style.background='#3B82F6';this.style.color='white'"
                        onmouseout="this.style.background='#EFF6FF';this.style.color='#3B82F6'">
                        👁 View
                    </button>
                </a>
                <a href="${note.fileUrl}" download style="flex:1;text-decoration:none;">
                    <button style="width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,#FFCC00,#F59E0B);border:none;color:#0A1931;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
                        ⬇ Download
                    </button>
                </a>
            </div>
        </div>`;
}
</script>

<!-- Save/Unsave Firebase Logic -->
<script type="module">
import { auth, db } from '/firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let currentUser = null;
window.savedNoteIds = new Set();

onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    currentUser = user;
    try {
        const snap = await getDocs(collection(db, 'users', user.uid, 'savedNotes'));
        snap.forEach(d => window.savedNoteIds.add(d.id));
    } catch(e) { console.error(e); }
});

window.toggleSaveNote = async function(noteId, btn) {
    if (!currentUser) { alert('Pehle login karo!'); return; }
    const isSaved = window.savedNoteIds.has(noteId);
    const icon = btn.querySelector('i');
    if (isSaved) {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'savedNotes', noteId));
        window.savedNoteIds.delete(noteId);
        btn.classList.remove('saved');
        icon.className = 'far fa-heart';
    } else {
        const note = (window.allNotes || []).find(n => n.id === noteId);
        if (!note) return;
        await setDoc(doc(db, 'users', currentUser.uid, 'savedNotes', noteId), {
            title: note.title || '',
            course: note.course || '',
            semester: note.semester || '',
            type: note.type || 'Notes',
            fileUrl: note.fileUrl || '',
            fileName: note.fileName || '',
            uploadedBy: note.uploadedBy || '',
            savedAt: new Date()
        });
        window.savedNoteIds.add(noteId);
        btn.classList.add('saved');
        icon.className = 'fas fa-heart';
        btn.style.transform = 'scale(1.3)';
        setTimeout(() => btn.style.transform = 'scale(1.1)', 200);
    }
};
</script>
